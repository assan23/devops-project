- name: Initialisation du master Kubernetes
  hosts: master
  become: yes

  tasks:
    - name: Initialiser le cluster (ignore les erreurs de RAM)
      command: |
        kubeadm init 
        --pod-network-cidr=10.244.0.0/16
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
        --ignore-preflight-errors=Mem
      register: kubeadm_init
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Créer le dossier .kube
      file:
        path: /home/{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copier la configuration
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/{{ ansible_user }}/.kube/config
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Installer le réseau Flannel
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: kubeadm_init.changed

    - name: Générer la commande pour les workers
      shell: kubeadm token create --print-join-command
      register: join_command
      when: kubeadm_init.changed

    - name: Sauvegarder la commande
      copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/kubeadm_join_command.txt
      when: kubeadm_init.changed
